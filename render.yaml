services:
  - type: web
    name: ilynect-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: aviindo863@gmail.com
      - key: JWT_SECRET
        generate: true
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true